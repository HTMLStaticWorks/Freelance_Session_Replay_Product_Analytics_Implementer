<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | InsightAnalytics</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c3aed' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='22 12 18 12 15 21 9 3 6 12 2 12'></polyline></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd',
                            400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9',
                            800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065',
                        },
                        secondary: '#64748B',
                        accent: '#FBCFE8',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#F8FAFF] dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300 overflow-x-hidden">
    
    <!-- Main Content -->
    <main class="min-h-screen flex items-center justify-center bg-mesh relative overflow-hidden">
        <div class="absolute top-1/4 -right-20 w-96 h-96 bg-primary-600/20 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-1/4 -left-20 w-96 h-96 bg-accent/20 rounded-full blur-3xl" style="animation-delay: -5s;"></div>

        <div class="fixed top-8 right-8 flex items-center gap-2 z-50">
            <button id="theme-toggle" class="w-10 h-10 rounded-xl bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-white dark:hover:bg-slate-800 transition-all text-slate-500 shadow-sm active:scale-95">
                <i data-lucide="sun" class="sun-icon w-5 h-5"></i>
                <i data-lucide="moon" class="moon-icon w-5 h-5 hidden"></i>
            </button>
            <button id="rtl-toggle" class="w-10 h-10 rounded-xl bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-white dark:hover:bg-slate-800 transition-all text-slate-500 shadow-sm active:scale-95">
                <i data-lucide="languages" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="w-full flex items-center justify-center p-6 relative z-10">
            <div class="w-full max-w-md reveal-up">

                <div class="bg-white/50 dark:bg-slate-900/50 backdrop-blur-xl border border-slate-200 dark:border-slate-800 p-8 lg:p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 dark:shadow-none">
                    <div class="text-center mb-8">
                        <a href="index.html" class="inline-flex items-center gap-2 group mb-6">
                            <div class="w-10 h-10 bg-primary-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary-500/20 group-hover:scale-110 transition-transform">
                                <i data-lucide="activity"></i>
                            </div>
                            <span class="text-xl font-bold font-heading tracking-tight">Insight<span class="text-primary-600">Analytics</span></span>
                        </a>
                        <h1 class="text-3xl font-bold font-heading mb-2">Create Account</h1>
                        <p class="text-slate-500">Join 10,000+ optimized product teams</p>
                    </div>

                    <form class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-xs font-bold ms-1 uppercase tracking-wider text-slate-400">Full Name</label>
                            <div class="relative group">
                                <i data-lucide="user" class="absolute start-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-primary-600 transition-colors"></i>
                                <input type="text" placeholder="John Doe" class="w-full ps-11 pe-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-800 focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none bg-slate-50 dark:bg-slate-900/50 transition-all text-sm">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-xs font-bold ms-1 uppercase tracking-wider text-slate-400">Email Address</label>
                            <div class="relative group">
                                <i data-lucide="mail" class="absolute start-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-primary-600 transition-colors"></i>
                                <input type="email" placeholder="name@company.com" class="w-full ps-11 pe-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-800 focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none bg-slate-50 dark:bg-slate-900/50 transition-all text-sm">
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="space-y-1">
                                <label class="text-xs font-bold ms-1 uppercase tracking-wider text-slate-400">Password</label>
                                <div class="relative group">
                                    <input type="password" id="signup-password" placeholder="••••••••" class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-800 focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none bg-slate-50 dark:bg-slate-900/50 transition-all text-sm">
                                    <button type="button" onclick="togglePassword('signup-password', this)" class="absolute end-3 top-1/2 -translate-y-1/2 text-slate-400">
                                        <i data-lucide="eye" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold ms-1 uppercase tracking-wider text-slate-400">Confirm</label>
                                <div class="relative group">
                                    <input type="password" id="signup-confirm" placeholder="••••••••" class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-800 focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none bg-slate-50 dark:bg-slate-900/50 transition-all text-sm">
                                    <button type="button" onclick="togglePassword('signup-confirm', this)" class="absolute end-3 top-1/2 -translate-y-1/2 text-slate-400">
                                        <i data-lucide="eye" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-start gap-3 p-1">
                            <input type="checkbox" id="terms" class="mt-1 w-4 h-4 rounded border-slate-300 text-primary-600 focus:ring-primary-500">
                            <label for="terms" class="text-xs text-slate-500 leading-relaxed">
                                I agree to the <a href="#" class="text-primary-600 font-bold hover:underline">Terms of Service</a> and <a href="#" class="text-primary-600 font-bold hover:underline">Privacy Policy</a>.
                            </label>
                        </div>

                        <button type="submit" class="w-full py-4 bg-primary-600 hover:bg-primary-700 text-white rounded-2xl font-bold text-lg shadow-xl shadow-primary-500/25 transition-all active:scale-95">
                            Create Account
                        </button>

                        <div class="relative py-2">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
                            </div>
                            <div class="relative flex justify-center text-[10px] uppercase font-bold tracking-widest">
                                <span class="bg-white dark:bg-slate-900 px-4 text-slate-400">Or sign up with</span>
                            </div>
                        </div>

                        <!-- Social Icons -->
                        <div class="flex justify-center gap-4">
                            <button type="button" class="w-12 h-12 flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all active:scale-95 hover:shadow-lg">
                                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                            </button>
                            <button type="button" class="w-12 h-12 flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all active:scale-95 hover:shadow-lg">
                                <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-5 h-5" alt="Facebook">
                            </button>
                            <button type="button" class="w-12 h-12 flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all active:scale-95 hover:shadow-lg">
                                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='currentColor'%3E%3Cpath d='M17.05 20.28c-.98.95-2.05 1.72-3.21 1.72-1.13 0-1.49-.69-2.79-.69-1.31 0-1.74.67-2.79.69-1.11.02-2.18-.76-3.17-1.72-2.02-1.95-3.57-5.51-3.57-8.86 0-3.34 1.73-5.11 3.4-5.11 1.05 0 1.96.65 2.65.65.67 0 1.72-.75 2.92-.75 1.54 0 2.87.82 3.56 1.97-3.19 1.9-2.67 6.01.54 7.29-.69 1.74-1.57 3.46-2.54 4.81zm-3.87-14.88c-.68.82-1.63 1.34-2.57 1.34-.14 0-.28-.02-.41-.04.14-1.91 1.34-3.5 2.57-4.7.14-.14.28-.27.42-.4.68 1.91.67 2.98-.01 3.8z'/%3E%3C/svg%3E" class="w-5 h-5 dark:invert" alt="Apple">
                            </button>
                        </div>

                        <p class="text-center text-sm text-slate-500">
                            Already have an account? <a href="login.html" class="text-primary-600 font-bold hover:underline">Log in</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
